<!doctype html>
<html>
    <head>
        <title>Add to Cart</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300&display=swap" rel="stylesheet">
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
        <link rel="manifest" href="/site.webmanifest">
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <section class="auth-panel" aria-labelledby="auth-heading">
                <h1 id="auth-heading">Shopping List</h1>
                <p id="auth-status" role="status" aria-live="polite">No user is signed in.</p>
                <div id="auth-controls">
                    <input type="email" id="email-input" placeholder="Email" autocomplete="email">
                    <input type="password" id="password-input" placeholder="Password" autocomplete="current-password">
                    <div class="auth-actions">
                        <button type="button" id="create-account-button">Create account</button>
                        <button type="button" id="sign-in-button">Sign in</button>
                    </div>
                </div>
                <button type="button" id="sign-out-button" hidden>Sign out</button>
                <p id="auth-error" role="alert" aria-live="assertive"></p>
            </section>
            <div id="shopping-list-interface" hidden>
                <img src="assets/cat.png">
                <input type="text" id="input-field" placeholder="Bread">
                <button id="add-button">Add to cart</button>
                <ul id="shopping-list">
                </ul>
            </div>
        </div>
        <script src="index.js" type="module"></script>
    </body>
</html>
